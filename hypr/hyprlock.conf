general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    color = rgba(7, 16, 21, 1.0)

    blur_passes = 3
    blur_size = 7
    brightness = 0.55
    contrast = 0.95
    vibrancy = 0.18
}

input-field {
    monitor =
    size = 320, 56
    position = 0, -40
    halign = center
    valign = center

    outline_thickness = 2
    rounding = 18

    outer_color = rgba(30, 175, 196, 0.85)
    inner_color = rgba(7, 16, 21, 0.76)
    font_color = rgba(217, 213, 195, 1.0)

    check_color = rgba(199, 167, 108, 0.95)
    fail_color = rgba(215, 111, 74, 0.95)

    dots_size = 0.22
    dots_spacing = 0.18
    dots_center = true

    fade_on_empty = false
    placeholder_text = <i>password</i>

    font_family = JetBrainsMono Nerd Font
}

label {
    monitor =
    text = $TIME
    color = rgba(217, 213, 195, 1.0)
    font_size = 72
    font_family = JetBrainsMono Nerd Font

    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = locked as $USER
    color = rgba(140, 203, 210, 0.85)
    font_size = 16
    font_family = JetBrainsMono Nerd Font

    position = 0, 40
    halign = center
    valign = center
}
