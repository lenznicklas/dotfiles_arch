# ── font ──────────────────────────────────────────────
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.5

# ── window ────────────────────────────────────────────
background_opacity 0.88
dynamic_background_opacity yes
window_padding_width 10
confirm_os_window_close 0

# ── cursor ────────────────────────────────────────────
cursor_shape beam
cursor_blink_interval 0.5
cursor #d9d5c3
cursor_text_color #071015

# ── base colors: fortress / storm cyan theme ──────────
foreground #d9d5c3
background #071015

selection_foreground #071015
selection_background #8ccbd2

url_color #1eafc4

# ── terminal colors ───────────────────────────────────
color0  #071015
color8  #53636a

color1  #d76f4a
color9  #f08a5d

color2  #7fa36f
color10 #9fbd8a

color3  #c7a76c
color11 #dfc184

color4  #1eafc4
color12 #58d5e7

color5  #9b7aa8
color13 #c09bd0

color6  #2fbbc6
color14 #7be3eb

color7  #d9d5c3
color15 #f2ead8

# ── tabs / internal kitty splits ──────────────────────
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_background #071015

active_tab_foreground #071015
active_tab_background #1eafc4

inactive_tab_foreground #d9d5c3
inactive_tab_background #14262d

active_border_color #1eafc4
inactive_border_color #27454d
bell_border_color #d76f4a

# ── quality of life ───────────────────────────────────
enable_audio_bell no
scrollback_lines 10000
copy_on_select clipboard
strip_trailing_spaces smart
